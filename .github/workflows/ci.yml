name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies from lock file
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip check

      - name: Run Ruff lint
        run: ruff check .

      - name: Run Ruff format check on infrastructure scope
        run: ruff format --check app/api app/core scripts main.py app/settings.py app/worker.py

      - name: Run pytest
        run: pytest

      - name: Prepare local environment file
        run: cp .env.example .env

      - name: Start infrastructure
        run: docker compose up --build -d db redis

      - name: Validate migrations
        run: docker compose run --rm migrate

      - name: Start API and worker
        run: docker compose up --build -d api worker

      - name: Run smoke test
        run: python scripts/smoke_stack.py

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Show service logs on failure
        if: failure()
        run: |
          docker compose logs --no-color api
          docker compose logs --no-color worker
          docker compose logs --no-color migrate

      - name: Tear down stack
        if: always()
        run: docker compose down -v