name: Security Scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

permissions:
  contents: read

jobs:
  app-image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build API image
        run: docker build -t ine_asturias_api:security .

      - name: Scan API image with Trivy
        id: trivy_scan
        continue-on-error: true
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "${{ github.workspace }}:/work" \
            aquasec/trivy:0.58.2 image \
            --ignore-unfixed \
            --severity HIGH,CRITICAL \
            --format table \
            --output /work/trivy-report.txt \
            --exit-code 1 \
            ine_asturias_api:security

      - name: Ensure Trivy report exists
        if: always()
        run: |
          if [ ! -f trivy-report.txt ]; then
            echo "Trivy report was not generated. Review the scan step logs." > trivy-report.txt
          fi

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-report
          path: trivy-report.txt
          if-no-files-found: error

      - name: Enforce vulnerability gate
        if: steps.trivy_scan.outcome == 'failure'
        run: |
          echo "Trivy detected HIGH or CRITICAL findings. Review trivy-report.txt and decide whether the RC is blocked or requires a documented exception."
          exit 1
