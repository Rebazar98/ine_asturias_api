global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: ine_asturias_api
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
    authorization:
      credentials_file: /etc/prometheus/bearer_token

  - job_name: ine_asturias_worker
    static_configs:
      - targets: ["worker:9001"]
    metrics_path: /metrics
