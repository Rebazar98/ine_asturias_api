global:
  resolve_timeout: 5m

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "webhook-default"

receivers:
  - name: "webhook-default"
    webhook_configs:
      # Replace with the actual GeoNalón webhook URL (Slack, Teams, or custom endpoint)
      # Example: https://hooks.slack.com/services/T.../B.../... or https://your-domain/alert-webhook
      - url: "http://localhost:9999/webhook"
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal: ["alertname"]
